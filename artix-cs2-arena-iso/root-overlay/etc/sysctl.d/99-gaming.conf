# ═══════════════════════════════════════════════════
# Gaming Performance Tuning — artix-cs2-arena
# Hardware: Ryzen 7 5700G / RTX 3060 Ti / 32GB DDR4
# ═══════════════════════════════════════════════════

# ─── Memory ───
# Lower dirty ratio — flush writes faster, prevent stutter
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5

# CS2/Proton requires very high max_map_count
vm.max_map_count = 2147483642

# Prefer zram over disk (zram is faster)
vm.swappiness = 100

# ─── Scheduler ───
# Disable autogroup for better game thread scheduling
kernel.sched_autogroup_enabled = 0

# ─── Filesystem ───
# Increase max file watches (Steam/Proton creates many)
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 1024

# ─── Kernel ───
# Allow unprivileged use of perf_event (MangoHud needs this)
kernel.perf_event_paranoid = -1

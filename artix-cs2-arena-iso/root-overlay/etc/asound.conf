# ALSA configuration for Realtek ALC S1200A
# On ASUS TUF B550M-Plus WiFi

# Default PCM device (will verify card index after install)
defaults.pcm.card 1
defaults.pcm.device 0

# Default mixer
defaults.ctl.card 1

# PulseAudio/PipeWire compatibility
pcm.!default {
    type pulse
    fallback "sysdefault"
    hint {
        show on
        description "Default Audio (PipeWire)"
    }
}

ctl.!default {
    type pulse
    fallback "sysdefault"
}

; ═══════════════════════════════════════════════════
; Polybar Configuration — artix-cs2-arena
; ═══════════════════════════════════════════════════

[bar/main]
modules-left = i3
modules-center = date
modules-right = pulseaudio memory cpu nvidia-gpu

width = 100%
height = 24pt
radius = 0

background = #1a1a2e
foreground = #e0e0e0

font-0 = Hack:size=10;2

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = %index%
label-focused-background = #0f3460
label-unfocused = %index%

[module/date]
type = internal/date
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-muted = mute
ramp-volume-0 = low
ramp-volume-1 = med
ramp-volume-2 = high

[module/memory]
type = internal/memory
format = <label>
label = RAM %percentage_used%%

[module/cpu]
type = internal/cpu
format = <label>
label = CPU %percentage%%

[module/nvidia-gpu]
type = custom/script
exec = nvidia-smi --query-gpu=utilization.gpu,temperature.gpu --format=csv,noheader,nounits 2>/dev/null || echo "N/A"
interval = 5
format = GPU <label>

# ═══════════════════════════════════════════════════
# PipeWire Low-Latency Gaming Audio Config
# Target: ~1.3ms latency @ 48000Hz quantum=64
# ═══════════════════════════════════════════════════

context.properties = {
    default.clock.rate = 48000
    default.clock.allowed-rates = [ 44100, 48000, 96000 ]
    default.clock.quantum = 64
    default.clock.min-quantum = 32
    default.clock.max-quantum = 256
}

context.modules = [
    { name = libpipewire-module-rt
        args = {
            nice.level = -11
            rt.prio = 88
            rt.time.soft = -1
            rt.time.hard = -1
        }
        flags = [ ifexists nofail ]
    }
]

# Resample quality — sacrifice quality for latency
stream.properties = {
    resample.quality = 1
}

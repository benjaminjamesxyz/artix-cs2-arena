# fstab generation — XFS with gaming-optimized mount options

mountOptions:
  - filesystem: xfs
    options: "defaults,noatime,discard=async,allocsize=64m"
  - filesystem: ext4
    options: "defaults,noatime"
  - filesystem: fat32
    options: "defaults,noatime"
  - filesystem: ext2
    options: "defaults,relatime"
  - filesystem: btrfs
    options: "defaults,noatime,compress=zstd"

ssdExtraMountOptions:
  - filesystem: xfs
    options: "discard=async"
  - filesystem: ext4
    options: "discard=async"
  - filesystem: btrfs
    options: "discard=async,compress=zstd"

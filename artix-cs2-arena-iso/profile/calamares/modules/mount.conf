# Mount configuration
extraMounts:
  - device: proc
    fs: proc
    mountPoint: /proc

  - device: sys
    fs: sysfs
    mountPoint: /sys

  - device: /dev
    fs: none
    mountPoint: /dev
    options: bind

  - device: /dev/pts
    mountPoint: /dev/pts
    fs: devpts

  - device: shm
    fs: tmpfs
    mountPoint: /dev/shm

  - device: /run
    fs: none
    mountPoint: /run
    options: bind

extraMountsEfi:
  - device: efivarfs
    fs: efivarfs
    mountPoint: /sys/firmware/efi/efivars

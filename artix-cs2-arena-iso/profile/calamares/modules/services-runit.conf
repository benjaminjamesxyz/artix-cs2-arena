# Services to enable via runit
# Gaming-optimized service set

services:
  - name: connman
    runlevel: default
    mandatory: true
  - name: dbus
    runlevel: default
    mandatory: true
  - name: lightdm
    runlevel: default
    mandatory: true
  - name: cpupower
    runlevel: default
    mandatory: true

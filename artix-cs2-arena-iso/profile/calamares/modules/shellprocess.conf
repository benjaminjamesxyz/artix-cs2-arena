# Post-install shell processes
# These run after all other modules complete

dontChroot: false

script:
  - "chmod +x /usr/local/bin/post-install/*.sh"
  - "/usr/local/bin/post-install/01-kernel-setup.sh"
  - "/usr/local/bin/post-install/02-nvidia-setup.sh"
  - "/usr/local/bin/post-install/03-gaming-stack.sh"
  - "/usr/local/bin/post-install/04-audio-setup.sh"
  - "/usr/local/bin/post-install/05-performance-tuning.sh"
  - "/usr/local/bin/post-install/06-peripherals.sh"
  - "/usr/local/bin/post-install/07-grub-setup.sh"
  - "systemctl --no-block enable cpupower || rc-update add cpupower default || true"
  - "echo 'artix-cs2-arena installation complete!' > /etc/artix-cs2-arena-release"

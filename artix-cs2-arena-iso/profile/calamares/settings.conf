# Calamares Settings — artix-cs2-arena
# Module sequence for automated gaming distro installation

modules-search: [ local, /usr/lib/calamares/modules ]

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - network
      - users
      - displaymanager
      - services-runit
      - shellprocess
  - show:
      - finished

branding: artix

prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true

# Save logs for debugging
restart-now:
  enabled: false

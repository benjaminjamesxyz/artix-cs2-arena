# artix-cs2-arena profile
# Custom Artix Linux ISO for Counter-Strike 2 gaming

# Display manager
displaymanager="lightdm"

# Network installation (false = all packages on ISO)
netinstall="false"

# Enable multilib (32-bit libraries for Proton/Steam)
multilib="true"

# Kernel for live environment
kernel="linux-zen"

# Hostname
hostname="cs2-arena"

# ISO metadata
iso_name="artix-cs2-arena"
iso_label="CS2ARENA"
iso_publisher="CS2 Gaming Distro"
iso_application="Artix CS2 Arena"

# Init system
init="runit"

# NVIDIA Display Configuration — 1080p@165Hz via DisplayPort
# RTX 3060 Ti → DisplayPort → 1080p@165Hz

Section "ServerLayout"
    Identifier "Layout0"
    Screen 0 "Screen0" 0 0
EndSection

Section "Monitor"
    Identifier "Monitor0"
    VendorName "Unknown"
    ModelName "Unknown"
    Option "DPMS" "false"
    # 165Hz refresh
    Modeline "1920x1080_165.00" 456.25 1920 2080 2288 2656 1080 1083 1088 1130 -hsync +vsync
EndSection

Section "Device"
    Identifier "Device0"
    Driver "nvidia"
    VendorName "NVIDIA Corporation"
    BoardName "GeForce RTX 3060 Ti"
    Option "Coolbits" "28"
    Option "AllowIndirectGLXProtocol" "off"
    Option "TripleBuffer" "on"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device "Device0"
    Monitor "Monitor0"
    DefaultDepth 24
    Option "Stereo" "0"
    Option "nvidiaXineramaInfoOrder" "DFP-1"
    Option "metamodes" "DP-0: 1920x1080_165 +0+0"
    Option "SLI" "Off"
    Option "MultiGPU" "Off"
    Option "BaseMosaic" "off"
    SubSection "Display"
        Depth 24
    EndSubSection
EndSection

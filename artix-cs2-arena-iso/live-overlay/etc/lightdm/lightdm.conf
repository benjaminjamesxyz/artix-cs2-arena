# ═══════════════════════════════════════════════════
# LightDM Configuration — artix-cs2-arena Live ISO
# Auto-login to i3 session for quick installer access
# ═══════════════════════════════════════════════════

[SeatDefaults]
# Display server type
type=x

# Greeter
greeter-session=lightdm-gtk-greeter

# Auto-login for live environment (no password)
autologin-user=artix
autologin-user-timeout=0
autologin-session=i3

# Session
user-session=i3
session-wrapper=/etc/lightdm/Xsession

# Disable timeout on greeter
greeter-setup-script=/usr/bin/test

[LightDM]
logind-check-graphical=false
